<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071A2B"/>
      <stop offset="55%" stop-color="#0B2A48"/>
      <stop offset="100%" stop-color="#071A2B"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#F7B728" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#F7B728" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F7B728" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 92px;
        font-weight: 800;
        letter-spacing: -1px;
        fill: #FFFFFF;
      }
      .tagline {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 36px;
        font-weight: 600;
        fill: rgba(255,255,255,0.88);
      }
      .url {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 28px;
        font-weight: 700;
        fill: rgba(255,255,255,0.70);
      }
      .pillText {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 22px;
        font-weight: 800;
        fill: rgba(7,26,43,0.92);
      }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g filter="url(#softShadow)">
    <rect x="84" y="94" width="1032" height="442" rx="42" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
  </g>

  <g transform="translate(130, 168)">
    <image href="./logo.png" x="0" y="0" width="180" height="180" />

    <g transform="translate(220, 18)">
      <text class="title" x="0" y="84">ExtraHand</text>
      <text class="tagline" x="0" y="148">Hire help or earn money near you</text>
      <g transform="translate(0, 182)">
        <rect x="0" y="0" rx="18" ry="18" width="312" height="44" fill="#F7B728"/>
        <text class="pillText" x="18" y="30">Public profile preview</text>
      </g>
      <text class="url" x="0" y="270">extrahand.in</text>
    </g>
  </g>
</svg>
